anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=077
nopriv_user=nobody
chroot_local_user=YES

pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# replace with your PUBLIC IP address (whatever the client sees)
pasv_address=127.0.0.1

listen=YES
listen_ipv6=NO

userlist_enable=NO
pam_service_name=login

xferlog_enable=YES
xferlog_std_format=YES

seccomp_sandbox=NO

idle_session_timeout=300
data_connection_timeout=120
max_clients=10
max_per_ip=3

# Uncomment to enable TLS (cert must exist at rsa_cert_file path)
# ssl_enable=YES
# rsa_cert_file=/etc/vsftpd/ssl/tls.crt
# rsa_private_key_file=/etc/vsftpd/ssl/tls.key
# force_local_logins_ssl=YES
# force_local_data_ssl=YES
