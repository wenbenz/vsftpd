name: Build and Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build-push:
    name: Build, Scan, and Push Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      packages: write

    outputs:
      vsftpd-version: ${{ steps.vsftpd-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Extract vsftpd version from image
        id: vsftpd-version
        run: |
          VERSION=$(docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            apk info vsftpd 2>/dev/null | grep '^vsftpd-' | head -1 | sed 's/^vsftpd-//' | sed 's/ .*//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  update-chart:
    name: Update Chart AppVersion
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update appVersion if changed
        run: |
          CURRENT=$(grep '^appVersion:' chart/Chart.yaml | sed 's/appVersion: *//' | tr -d '"')
          NEW="${{ needs.build-push.outputs.vsftpd-version }}"
          if [ "$CURRENT" != "$NEW" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${NEW}\"/" chart/Chart.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add chart/Chart.yaml
            git commit -m "chore: update vsftpd appVersion to ${NEW}"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
