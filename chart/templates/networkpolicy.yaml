{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pureftpd.fullname" . }}
  labels:
    {{- include "pureftpd.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pureftpd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 21
          protocol: TCP
        {{- $min := .Values.service.ports.passive.min }}
        {{- $max := .Values.service.ports.passive.max }}
        {{- range untilStep (int $min) (add1 (int $max) | int) 1 }}
        - port: {{ . }}
          protocol: TCP
        {{- end }}
      {{- if .Values.networkPolicy.ingressCidrs }}
      from:
        {{- range .Values.networkPolicy.ingressCidrs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
{{- end }}
