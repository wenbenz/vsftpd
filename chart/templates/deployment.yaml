apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pureftpd.fullname" . }}
  labels:
    {{- include "pureftpd.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "pureftpd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pureftpd.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: init-users
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/entrypoint.sh", "init"]
          env:
            - name: WRITE_ENABLE
              value: "{{ if .Values.writeEnable }}YES{{ else }}NO{{ end }}"
          volumeMounts:
            - name: users-conf
              mountPath: /etc/pure-ftpd/users.conf
              subPath: users.conf
            - name: passwords
              mountPath: /etc/pure-ftpd/passwords
              readOnly: true
            - name: etc-data
              mountPath: /etc-data
            - name: data
              mountPath: /home
            {{- if include "pureftpd.tlsEnabled" . }}
            - name: tls
              mountPath: /etc/pure-ftpd/ssl
              readOnly: true
            {{- end }}
      containers:
        - name: pure-ftpd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/entrypoint.sh", "start"]
          env:
            - name: PASV_MIN_PORT
              value: "{{ .Values.service.ports.passive.min }}"
            - name: PASV_MAX_PORT
              value: "{{ .Values.service.ports.passive.max }}"
            - name: MAX_CLIENTS
              value: "{{ .Values.maxClients }}"
            - name: MAX_PER_IP
              value: "{{ .Values.maxPerIp }}"
            - name: WRITE_ENABLE
              value: "{{ if .Values.writeEnable }}YES{{ else }}NO{{ end }}"
            {{- if .Values.pasvAddress }}
            - name: PASV_ADDRESS
              value: "{{ .Values.pasvAddress }}"
            {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add:
                - NET_BIND_SERVICE
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
                - SYS_CHROOT
          ports:
            - name: ftp
              containerPort: 21
              protocol: TCP
            {{- $min := .Values.service.ports.passive.min }}
            {{- $max := .Values.service.ports.passive.max }}
            {{- range untilStep (int $min) (add1 (int $max) | int) 1 }}
            - name: pasv-{{ . }}
              containerPort: {{ . }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: etc-data
              mountPath: /etc-data
              readOnly: true
            {{- if include "pureftpd.tlsEnabled" . }}
            - name: etc-data
              mountPath: /etc/ssl/private/pure-ftpd.pem
              subPath: pure-ftpd.pem
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run
            - name: log
              mountPath: /var/log
            - name: data
              mountPath: /home

      volumes:
        - name: users-conf
          configMap:
            name: {{ include "pureftpd.fullname" . }}-users
            defaultMode: 0400
        - name: passwords
          secret:
            secretName: {{ if .Values.existingSecret }}{{ .Values.existingSecret }}{{ else }}{{ include "pureftpd.fullname" . }}-passwords{{ end }}
            defaultMode: 0400
        - name: etc-data
          emptyDir: {}
        - name: tmp
          emptyDir:
            medium: Memory
        - name: run
          emptyDir:
            medium: Memory
        - name: log
          emptyDir:
            medium: Memory
        {{- if include "pureftpd.tlsEnabled" . }}
        - name: tls
          secret:
            secretName: {{ include "pureftpd.tlsSecretName" . }}
            defaultMode: 0400
        {{- end }}
        - name: data
          {{- if .Values.persistence.enabled }}
          {{- if .Values.persistence.hostPath }}
          hostPath:
            path: {{ .Values.persistence.hostPath }}
            type: Directory
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "pureftpd.fullname" . }}-data
          {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
