{{- if not .Values.existingSecret }}
{{- $hasPasswords := false }}
{{- range .Values.users }}
{{- if .password }}
{{- $hasPasswords = true }}
{{- end }}
{{- end }}
{{- if not $hasPasswords }}
{{- fail "No passwords configured: set a `password` on each user in values.yaml, or set existingSecret to point to an existing secret." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vsftpd.fullname" . }}-passwords
  labels:
    {{- include "vsftpd.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range .Values.users }}
  {{- if .password }}
  {{ .username }}: {{ .password | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
